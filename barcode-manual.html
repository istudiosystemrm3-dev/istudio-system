<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พิมพ์บาร์โค้ดสินค้า (Manual) - iServe</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    
    <!-- ดึงไฟล์ style.css ส่วนกลางมาใช้งาน -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* สไตล์เฉพาะของหน้าบาร์โค้ด */
        .container { max-width: 1300px; display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        
        input[type="range"] { width: 100%; box-sizing: border-box; outline: none; }
        .btn-print { background-color: #0071e3; color: white; border: none; padding: 12px 15px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-print:hover { background-color: #005bb5; }
        
        .search-box { margin-bottom: 15px; }
        .search-box input { width: 100%; border-color: #0071e3; background-color: #f5f5f7; padding: 12px; font-size: 15px; border: 1px solid #d2d2d7; border-radius: 6px; box-sizing: border-box; outline: none; }
        .filter-section { background: #f5f5f7; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; max-height: 1200px; overflow-y: auto; padding: 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; background: white; padding: 6px 12px; border-radius: 6px; border: 1px solid #d2d2d7; font-size: 13px; cursor: pointer; user-select: none; }
        .checkbox-label input { margin: 0; width: 16px; height: 16px; }
        .checkbox-label:hover { border-color: #0071e3; background-color: #f0f7ff; }
        .shortcut-btns { margin-bottom: 8px; }
        .btn-link { background: none; border: none; color: #0071e3; cursor: pointer; font-size: 12px; padding: 0; margin-right: 15px; font-weight: 500; text-decoration: underline; }
        
        .btn-delete { background-color: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        #printArea { display: none; }

        @media print { 
            body { background: white; margin: 0; padding: 0; }
            .navbar, .container { display: none !important; } 
            #printArea { display: block; visibility: visible; position: absolute; left: 0; top: 0; width: 100%; padding: 10px; box-sizing: border-box; }
            
            .print-table { width: 100%; border-collapse: collapse; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #000; }
            .print-table td { border: 1px solid #000; padding: 8px 10px; vertical-align: middle; }
            
            .col-1-barcode { text-align: center; width: 22%; padding: 5px 0 !important; }
            .col-2-code { text-align: center; width: 15%; font-size: 15px; }
            .col-3-desc { text-align: left; width: 50%; font-size: 15px; }
            .col-4-price { text-align: right; width: 13%; font-size: 15px; }
            
            .col-1-barcode svg { max-width: 100%; height: auto; display: block; margin: 0 auto; } 
            @page { margin: 10mm; } 
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>
    <div class="container no-print">
        <div class="card">
            <h2>⚙️ ตั้งค่าก่อนพิมพ์</h2>
            <div class="flex-group form-group">
                <div class="flex-item">
                    <label>ขนาดอักษรรหัส: <span id="fontVal">14</span>px</label>
                    <input type="range" id="fontSize" min="10" max="20" value="14" oninput="updateSettings()">
                </div>
                <div class="flex-item">
                    <label>ความสูงบาร์โค้ด: <span id="heightVal">45</span>px</label>
                    <input type="range" id="barHeight" min="30" max="80" value="45" oninput="updateSettings()">
                </div>
            </div>
            <button class="btn-print" onclick="window.print()">🖨️ สั่งพิมพ์บาร์โค้ดแบบตาราง (Print)</button>
        </div>
        <div class="card">
            <h2>📋 รายการบาร์โค้ดและระบบกรองพิมพ์ (<span id="totalItems">0</span>)</h2>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 พิมพ์เพื่อค้นหาพาร์ท: รหัส (Code), รายละเอียด (Description), รุ่น (Model)..." onkeyup="renderTable()" autofocus>
            </div>

            <div class="filter-section">
                <label style="color: #1d1d1f; font-size: 13px;">เลือกหมวดหมู่ที่ต้องการแสดงและสั่งพิมพ์:</label>
                <div class="shortcut-btns">
                    <button class="btn-link" onclick="toggleAllCheckboxes(true)">✓ เลือกทั้งหมด</button>
                    <button class="btn-link" onclick="toggleAllCheckboxes(false)">✕ ล้างทั้งหมด</button>
                </div>
                <div id="categoryCheckboxes" class="checkbox-group">
                    </div>
            </div>

            <div style="overflow-x: auto; max-height: 550px; overflow-y: auto; border: 1px solid #e5e5e7; border-radius: 6px;">
                <table>
                    <thead style="position: sticky; top: 0; z-index: 1;">
                        <tr>
                            <th width="15%">Code</th>
                            <th width="35%">Description</th>
                            <th width="15%">Model</th>
                            <th width="15%">Categories</th>
                            <th width="12%" style="text-align: right;">Price</th>
                            <th width="8%" style="text-align: center;">ลบ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 30px; color:#86868b;">กำลังโหลดจากชีต...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="printArea"></div>

    <script>
        let barcodeData = [];

        window.onload = function() { loadData(); };

        function loadData() {
            fetch(WEB_APP_URL + "?action=getBarcodes")
                .then(res => res.json())
                .then(data => {
                    barcodeData = data;
                    updateCategorySelection();
                    renderTable();
                }).catch(err => alert("โหลดข้อมูลพลาด กรุณารีเฟรชหน้าเว็บอีกครั้ง"));
        }

        // ฟังก์ชันสร้างกล่อง Checkbox หมวดหมู่ทั้งหมดแบบอัตโนมัติ
        function updateCategorySelection() {
            let cats = [...new Set(barcodeData.map(i => String(i.category || "ทั่วไป").trim()))].sort();
            let container = document.getElementById('categoryCheckboxes');
            
            container.innerHTML = cats.map((cat, idx) => `
                <label class="checkbox-label">
                    <input type="checkbox" class="cat-checkbox" value="${cat}" checked onchange="renderTable()">
                    ${cat}
                </label>
            `).join('');
        }

        // ฟังก์ชันกดทางลัด เลือกทั้งหมด / ล้างทั้งหมด
        function toggleAllCheckboxes(status) {
            let checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = status);
            renderTable();
        }

        function renderTable() {
            // 1. ดึงค่าคำค้นหา
            let keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            let keywordsArray = keyword.split(" ").filter(k => k.trim() !== "");
            
            // 2. ดึงค่าหมวดหมู่ที่ถูกติ๊กเลือก
            let checkedCats = [];
            document.querySelectorAll('.cat-checkbox:checked').forEach(cb => checkedCats.push(cb.value));

            // 3. เริ่มทำการกรองข้อมูล
            let displayData = barcodeData;

            // กรองด้วยคำค้นหา
            if (keywordsArray.length > 0) {
                displayData = displayData.filter(item => {
                    let combinedText = (String(item.code || "") + " " + String(item.desc || "") + " " + String(item.model || "") + " " + String(item.category || "")).toLowerCase();
                    return keywordsArray.every(k => combinedText.includes(k));
                });
            }

            // กรองด้วยหมวดหมู่ที่เลือก
            displayData = displayData.filter(item => checkedCats.includes(String(item.category || "ทั่วไป").trim()));

            // 4. บรรทัดไม้ตาย: เรียงลำดับตาม Description (ก-ฮ และ A-Z)
            displayData.sort((a, b) => {
                let descA = String(a.desc || "");
                let descB = String(b.desc || "");
                return descA.localeCompare(descB, 'th'); // รองรับการเรียงภาษาไทยได้อย่างแม่นยำ
            });
            
            document.getElementById('totalItems').innerText = displayData.length.toLocaleString();
            
            // วาดตารางแสดงผลบนหน้าเว็บ
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            if(displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px; color:#86868b;">ไม่พบข้อมูลรายการที่ตรงกับเงื่อนไข</td></tr>`;
            } else {
                displayData.forEach((item) => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight:bold; color:#515154;">${item.code || "-"}</td>
                        <td style="color:#1d1d1f; font-weight:500;">${item.desc || "-"}</td>
                        <td><span class="badge" style="background:#f4e6fa; color:#8a2be2;">${item.model || "-"}</span></td>
                        <td><span class="badge">${item.category || "-"}</span></td>
                        <td style="text-align: right; color:#ff3b30; font-weight:bold;">${item.price ? parseFloat(item.price).toLocaleString() : '-'}</td>
                        <td style="text-align: center;"><button class="btn-delete" onclick="deleteData('${item.code}')">✕</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // วาดโครงสร้างสำหรับสั่งพิมพ์กระดาษ (จะอัปเดตตามการกรองและเรียงลำดับด้านบนทันที)
            let printArea = document.getElementById('printArea');
            printArea.innerHTML = "";
            
            if(displayData.length > 0) {
                let printTable = document.createElement('table');
                printTable.className = "print-table";
                let printTbody = document.createElement('tbody');
                
                let fontSize = document.getElementById('fontSize').value;
                let barHeight = document.getElementById('barHeight').value;

                displayData.forEach((item, index) => {
                    let tr = document.createElement('tr');
                    let printDesc = item.desc || "";
                    if(item.model) printDesc += ` (${item.model})`;

                    tr.innerHTML = `
                        <td class="col-1-barcode"><svg id="bc-${index}"></svg></td>
                        <td class="col-2-code">${item.code || ""}</td>
                        <td class="col-3-desc">${printDesc}</td>
                        <td class="col-4-price">${item.price ? parseFloat(item.price).toLocaleString() : ""}</td>
                    `;
                    printTbody.appendChild(tr);
                });
                
                printTable.appendChild(printTbody);
                printArea.appendChild(printTable);

                // สร้างแท่งบาร์โค้ดลงบน SVG
                displayData.forEach((item, index) => {
                    let barcodeValue = String(item.code || "-"); 
                    JsBarcode("#bc-" + index, barcodeValue, { 
                        format: "CODE128", 
                        width: 1.5, 
                        height: barHeight, 
                        displayValue: true, 
                        fontSize: fontSize, 
                        fontOptions: "bold",
                        margin: 5 
                    });
                });
            }
        }

        function updateSettings() {
            document.getElementById('fontVal').innerText = document.getElementById('fontSize').value;
            document.getElementById('heightVal').innerText = document.getElementById('barHeight').value;
            renderTable();
        }
        
        function deleteData(codeId) {
            if(!confirm(`ต้องการลบรหัส ${codeId} ออกจากฐานข้อมูลใช่หรือไม่?`)) return;
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "deleteBarcode", code: codeId })
            }).then(() => loadData());
        }
    </script>
</body>
</html>
