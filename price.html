<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางราคาซ่อมและบริการ - ระบบออนไลน์</title>
    
    <!-- ดึงไฟล์ style.css ส่วนกลางมาใช้งาน -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* สไตล์เฉพาะของหน้าตารางราคา */
        .container { max-width: 1280px; display: grid; grid-template-columns: 1fr 3.5fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { flex: 1; border-color: #0071e3; background-color: #f5f5f7; padding: 12px; font-size: 15px; border: 1px solid #d2d2d7; border-radius: 6px; outline: none; }
        
        .controls-box { display: flex; gap: 10px; margin-bottom: 15px; background: #f5f5f7; padding: 10px; border-radius: 8px; }
        .controls-box select { width: 100%; padding: 8px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 13px; outline: none; }
        
        .table-container { overflow-x: auto; max-height: 650px; overflow-y: auto; border: 1px solid #e5e5e7; border-radius: 6px; }
        thead th { position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .price-text { font-weight: bold; color: #ff3b30; }
        .total-text { font-weight: bold; color: #0071e3; font-size: 15px; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background-color: #ff9500; color: white; }
        .status-connected { background-color: #34c759; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>
    <div class="container">
        <div class="card">
            <h2>☁️ สถานะตารางราคา</h2>
            <div style="margin-bottom: 15px;">
                สถานะระบบ: <span id="syncStatus" class="status-badge">กำลังเชื่อมต่อ...</span>
            </div>
            <div class="controls-box" style="display: block;">
                <label style="font-size: 12px; font-weight: bold; color: #515154; display: block; margin-bottom: 5px;">กรองตาม ID:</label>
                <select id="filterCategory" onchange="filterTable()">
                    <option value="ALL">-- แสดงทั้งหมด --</option>
                </select>
            </div>
            <p style="font-size: 12px; color: #86868b; line-height: 1.5;">
                💡 ระบบจะคำนวณ <strong>Price + Service</strong> ให้เป็น Total Price โดยอัตโนมัติครับ
            </p>
        </div>
        <div class="card">
            <h2>📋 รายการตารางราคาซ่อม (แท็บ Price) - รวม <span id="totalCount">0</span> รายการ</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ค้นหาชื่อรายการ, Code หรือ ID..." onkeyup="filterTable()" autofocus>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="8%">ID</th>
                            <th width="15%">Code</th>
                            <th width="37%">Description</th>
                            <th width="12%" class="text-right">Price</th>
                            <th width="12%" class="text-right">Service</th>
                            <th width="16%" class="text-right">Total Price</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 30px; color: #86868b;">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        let priceDatabase = [];

        window.onload = function() {
            loadOnlinePrices();
        };

        function loadOnlinePrices() {
            fetch(WEB_APP_URL + "?action=getPrices")
                .then(res => res.json())
                .then(data => {
                    priceDatabase = data;
                    document.getElementById('syncStatus').innerText = "เชื่อมต่อสำเร็จ";
                    document.getElementById('syncStatus').classList.add('status-connected');
                    updateCategoryDropdown();
                    renderTable(priceDatabase);
                })
                .catch(err => {
                    document.getElementById('syncStatus').innerText = "เชื่อมต่อล้มเหลว";
                    document.getElementById('syncStatus').style.backgroundColor = "#ff3b30";
                });
        }

        function updateCategoryDropdown() {
            let ids = [...new Set(priceDatabase.map(item => String(item.id || "")).filter(val => val !== ""))];
            let select = document.getElementById('filterCategory');
            select.innerHTML = `<option value="ALL">-- แสดงทั้งหมด --</option>` + 
                               ids.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function renderTable(dataArray) {
            let tbody = document.getElementById('dataTableBody');
            document.getElementById('totalCount').innerText = dataArray.length.toLocaleString();
            tbody.innerHTML = "";

            if(dataArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 30px; color:#86868b;">ไม่พบข้อมูล</td></tr>`;
                return;
            }

            dataArray.forEach(item => {
                let partVal = parseFloat(String(item.category).replace(/,/g, '')) || 0;
                let servVal = parseFloat(String(item.price).replace(/,/g, '')) || 0;
                let totalVal = partVal + servVal;

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge">${item.id || "-"}</span></td>
                    <td style="font-weight: 500; color: #515154;">${item.code || "-"}</td>
                    <td style="color: #1d1d1f;">${item.desc || "-"}</td>
                    <td class="text-right" style="color: #86868b;">${partVal > 0 ? partVal.toLocaleString() : "-"}</td>
                    <td class="text-right" style="color: #86868b;">${servVal > 0 ? servVal.toLocaleString() : "-"}</td>
                    <td class="text-right total-text">${totalVal > 0 ? totalVal.toLocaleString() + ' ฿' : "-"}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            let catFilter = document.getElementById('filterCategory').value;
            let keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            let keywords = keyword.split(" ").filter(k => k.trim() !== "");
            
            let filteredData = priceDatabase.filter(item => {
                let matchCat = (catFilter === "ALL" || String(item.id || "") === catFilter);
                let combinedText = (String(item.id||"") + " " + String(item.code||"") + " " + String(item.desc||"")).toLowerCase();
                let matchKeyword = keywords.every(k => combinedText.includes(k));
                return matchCat && matchKeyword;
            });

            renderTable(filteredData);
        }
    </script>
</body>
</html>
