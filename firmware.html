<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Firmware - iServe</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 0; margin: 0; background-color: #ffffff; color: #333333; }
        .navbar { background-color: #1d1d1f; padding: 15px 20px; text-align: center; }
        .navbar a { color: #f5f5f7; text-decoration: none; padding: 10px 20px; margin: 0 5px; border-radius: 6px; font-size: 15px; font-weight: 500; transition: 0.3s; }
        .navbar a:hover { background-color: #333336; }
        .navbar a.active { background-color: #0071e3; color: white; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        h3 { font-size: 18px; margin-bottom: 15px; color: #111; }
        
        /* สไตล์ให้เหมือนภาพเป๊ะๆ */
        .fw-line { font-size: 15px; line-height: 1.6; margin-bottom: 4px; }
        .fw-line a { color: #0071e3; text-decoration: none; }
        .fw-line a:hover { text-decoration: underline; }
        
        #statusMsg { color: #ff9500; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>

    <div class="container">
        <h3>Latest Firmware</h3>
        <div id="statusMsg">⏳ ระบบกำลังโหลดรายชื่อไฟล์... (โปรดรอสักครู่)</div>
        
        <!-- จุดที่ข้อความลิสต์จะมาเรียงกันตรงนี้ -->
        <div id="listContainer"></div>
    </div>

    <script>
        const IPSW_API_URL = "https://api.ipsw.me/v4/devices";
        const delay = ms => new Promise(res => setTimeout(res, ms));

        window.onload = async function() {
            try {
                let response = await fetch(IPSW_API_URL);
                let allDevices = await response.json();
                
                // คัดมาเฉพาะตระกูลที่ต้องใช้ (ตัดพวก Apple TV, Watch ออกให้ดูง่ายๆ)
                let targetDevices = allDevices.filter(d => 
                    d.identifier.includes("iPhone") || 
                    d.identifier.includes("iPad") || 
                    d.identifier.includes("Mac")
                );

                let listContainer = document.getElementById('listContainer');
                let batchSize = 10; // โหลดทีละ 10 รุ่นเพื่อไม่ให้ Server Apple บล็อก

                for (let i = 0; i < targetDevices.length; i += batchSize) {
                    let batch = targetDevices.slice(i, i + batchSize);
                    let promises = batch.map(device => 
                        fetch("https://api.ipsw.me/v4/device/" + device.identifier)
                            .then(res => res.json())
                            .catch(err => null)
                    );
                    
                    let results = await Promise.all(promises);
                    
                    results.forEach(deviceInfo => {
                        if (deviceInfo && deviceInfo.firmwares) {
                            // ดึงเฉพาะไฟล์ล่าสุดที่เปิด Sign
                            let latestFw = deviceInfo.firmwares.find(fw => fw.signed === true);
                            
                            if (latestFw) {
                                // สกัดเอาเฉพาะ "ชื่อไฟล์" ออกมาจาก URL ยาวๆ
                                let filename = latestFw.url.split('/').pop();
                                
                                // สร้างบรรทัดข้อความตาม Format เป๊ะๆ: เวอร์ชัน (ชื่อรุ่น): ไฟล์.ipsw
                                let line = document.createElement('div');
                                line.className = 'fw-line';
                                line.innerHTML = \`\${latestFw.version} (\${deviceInfo.name}): <a href="\${latestFw.url}" target="_blank">\${filename}</a>\`;
                                
                                listContainer.appendChild(line);
                            }
                        }
                    });
                    
                    let percent = Math.round((Math.min(i + batch.length, targetDevices.length) / targetDevices.length) * 100);
                    document.getElementById('statusMsg').innerText = \`⏳ กำลังโหลดไฟล์... \${percent}%\`;

                    await delay(400); // หน่วงเวลาดึงข้อมูลนิดหน่อยเพื่อความปลอดภัย
                }

                // โหลดเสร็จ ซ่อนข้อความสถานะทิ้งไป
                document.getElementById('statusMsg').style.display = "none";

            } catch (error) {
                document.getElementById('statusMsg').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
                document.getElementById('statusMsg').style.color = "red";
            }
        };
    </script>
</body>
</html>
